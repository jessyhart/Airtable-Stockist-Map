name: Build stockists JSON

on:
  schedule:
    - cron: '0 16 * * *'      # 02:00 AEST (16:00 UTC) daily
  workflow_dispatch:           # lets you run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stockists.json
        run: node build-stockists.mjs
        env:
          AIRTABLE_TOKEN: ${{ pat8ZaKPfqulGFIAX.6b0e3d3d84d78ea3e3ad3f376066eac88d34de37f1de11f331376e10a89d9452 }}

      - name: Commit if changed
        run: |
          git config user.name "jessyhart"
          git config user.email "hartjessy@gmail.com"
          git add stockists.json
          git diff --staged --quiet || git commit -m "Update stockists $(date -u +%FT%TZ)"
          git push
